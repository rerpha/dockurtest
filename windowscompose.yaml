services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "11l"
      DISK_SIZE: "128G"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - /tmp/windows:/storage
      - ./example:/oem
    restart: always
    stop_grace_period: 2m

